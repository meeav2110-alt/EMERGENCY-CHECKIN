  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --card2: #1a2235;
    --border: #1e2d45;
    --accent: #f97316;
    --accent2: #ef4444;
    --green: #22c55e;
    --yellow: #eab308;
    --text: #f1f5f9;
    --muted: #64748b;
    --present: #14532d;
    --present-border: #22c55e;
    --absent: #450a0a;
    --absent-border: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
    border-bottom: 2px solid var(--accent);
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 24px rgba(249,115,22,0.2);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text h1 { font-size: 16px; font-weight: 900; letter-spacing: -0.5px; }
  .logo-text p { font-size: 11px; color: var(--muted); }

  .date-time {
    text-align: left;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }
  .date-time strong { color: var(--accent); font-size: 13px; }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 10px;
  }
  .stat {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 8px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-num { font-size: 22px; font-weight: 900; line-height: 1; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .stat.total .stat-num { color: var(--text); }
  .stat.present .stat-num { color: var(--green); }
  .stat.absent .stat-num { color: var(--accent2); }
  .stat.unknown .stat-num { color: var(--yellow); }

  /* Progress bar */
  .progress-wrap {
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    margin-top: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #86efac);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* Search & filters */
  .controls {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px 12px 44px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  .filter-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-tab.active { background: var(--accent); border-color: var(--accent); color: white; font-weight: 700; }
  .filter-tab.green.active { background: var(--green); border-color: var(--green); }
  .filter-tab.red.active { background: var(--accent2); border-color: var(--accent2); }

  /* Contractor sections */
  .contractor-section {
    margin: 0 12px 12px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .contractor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .contractor-header:active { opacity: 0.8; }
  .contractor-left { display: flex; align-items: center; gap: 10px; }
  .contractor-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .contractor-name { font-size: 14px; font-weight: 700; }
  .contractor-meta { font-size: 11px; color: var(--muted); }
  .contractor-right { display: flex; align-items: center; gap: 8px; }
  .mini-stat {
    display: flex; align-items: center; gap: 3px;
    font-size: 12px; font-weight: 700;
  }
  .mini-stat.g { color: var(--green); }
  .mini-stat.r { color: var(--accent2); }
  .chevron { color: var(--muted); transition: transform 0.3s; font-size: 14px; }
  .chevron.open { transform: rotate(180deg); }

  .workers-list {
    display: none;
    flex-direction: column;
    gap: 0;
  }
  .workers-list.open { display: flex; }

  /* Worker row */
  .worker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--card2);
    transition: background 0.15s;
  }
  .worker-row.present { background: rgba(34,197,94,0.08); border-right: 3px solid var(--green); }
  .worker-row.absent { background: rgba(239,68,68,0.08); border-right: 3px solid var(--accent2); }

  .worker-info { flex: 1; min-width: 0; }
  .worker-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .worker-phone { font-size: 11px; color: var(--muted); direction: ltr; }
  .worker-note { font-size: 10px; color: var(--yellow); margin-top: 1px; }

  .btn-group { display: flex; gap: 6px; flex-shrink: 0; }
  .btn-check {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 2px solid;
    background: transparent;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-check:active { transform: scale(0.9); }
  .btn-yes { border-color: var(--green); color: var(--green); }
  .btn-yes.active { background: var(--green); color: white; }
  .btn-no { border-color: var(--accent2); color: var(--accent2); }
  .btn-no.active { background: var(--accent2); color: white; }

  .call-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .call-btn:active { background: var(--border); }

  /* Export button */
  .export-wrap {
    padding: 16px;
    display: flex;
    gap: 10px;
  }
  .export-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .export-btn:active { transform: scale(0.97); }
  .btn-report { background: var(--accent); color: white; }
  .btn-reset { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 20px 40px;
    border-top: 2px solid var(--accent);

  .modal h2 { font-size: 18px; font-weight: 900; margin-bottom: 6px; }
  .modal .sub { color: var(--muted); font-size: 12px; margin-bottom: 20px; }
  .report-line {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .report-line:last-child { border-bottom: none; }
  .report-section-title {

    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;

    font-size: 11px;

  .modal-close {
    width: 100%; padding: 14px;
    background: var(--border); border: none; border-radius: 12px;
    color: var(--text); font-family: 'Heebo', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 20px;

  .btn-ok { border-color: #16a34a; color: #16a34a; font-size: 16px; }
  .btn-ok.active { background: linear-gradient(135deg,#15803d,#22c55e); border-color: #22c55e; color: white; box-shadow: 0 0 10px rgba(34,197,94,0.5); }

    color: #4ade80; border: 1px solid #22c55e;
    white-space: nowrap; display: none; letter-spacing: 0.3px;
  }
  .ok-badge.show { display: inline-block; }
    text-align: center;
    padding: 40px 20px;

</style>
</head>

// State: {workerKey: 'present'|'absent'|null}
const state = {};
const stateOk = {}; // סיום חירום - מצב תקין
let currentFilter = 'all';

function workerKey(cIdx, wIdx) { return `${cIdx}_${wIdx}`; }

function updateStats() {
  let total=0, present=0, absent=0;
  contractors.forEach((c,ci) => c.workers.forEach((_,wi) => {
    total++;
    const s = state[workerKey(ci,wi)];
    if(s==='present') present++;
    else if(s==='absent') absent++;
  }));
  const unknown = total - present - absent;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-present').textContent = present;
  document.getElementById('s-absent').textContent = absent;
  document.getElementById('s-unknown').textContent = unknown;
  const pct = total > 0 ? Math.round(present/total*100) : 0;
  document.getElementById('progress').style.width = pct + '%';
  // Update section mini stats
  contractors.forEach((c,ci) => {
    let cp=0, ca=0;
    c.workers.forEach((_,wi) => {
      const s = state[workerKey(ci,wi)];
      if(s==='present') cp++;
      else if(s==='absent') ca++;
    });
    const el = document.getElementById(`section-stats-${ci}`);
    if(el) el.innerHTML = `<span class="mini-stat g">✓${cp}</span><span class="mini-stat r">✗${ca}</span>`;
  });
}

function toggleOk(ci, wi) {
  const k = workerKey(ci, wi);
  if(stateOk[k]) delete stateOk[k];
  else stateOk[k] = true;
  renderWorkerRow(ci, wi);
}

function toggle(ci, wi, val) {
  const k = workerKey(ci,wi);
  if(state[k]===val) delete state[k];
  else state[k]=val;
  renderWorkerRow(ci, wi);
  updateStats();
  filterWorkers();
}

function renderWorkerRow(ci, wi) {
  const w = contractors[ci].workers[wi];
  const k = workerKey(ci,wi);
  const s = state[k];
  const row = document.getElementById(`row-${ci}-${wi}`);
  if(!row) return;
  row.className = 'worker-row' + (s==='present'?' present':s==='absent'?' absent':'');
  const btnY = row.querySelector('.btn-yes');
  const btnN = row.querySelector('.btn-no');
  if(btnY) btnY.className = 'btn-check btn-yes' + (s==='present'?' active':'');
  if(btnN) btnN.className = 'btn-check btn-no' + (s==='absent'?' active':'');
  const btnOk = row.querySelector('.btn-ok');
  if(btnOk) btnOk.className = 'btn-check btn-ok' + (stateOk[k]?' active':'');
  const okBadge = row.querySelector('.ok-badge');
  if(okBadge) okBadge.className = 'ok-badge' + (stateOk[k]?' show':'');
}

function buildUI() {
  const container = document.getElementById('contractors-container');
  container.innerHTML = '';
  contractors.forEach((c, ci) => {
    const section = document.createElement('div');
    section.className = 'contractor-section';
    section.id = `section-${ci}`;

    section.innerHTML = `
      <div class="contractor-header" onclick="toggleSection(${ci})">

      <div class="workers-list open" id="list-${ci}"></div>

    container.appendChild(section);

    const list = document.getElementById(`list-${ci}`);
    c.workers.forEach((w, wi) => {
      const row = document.createElement('div');
      row.className = 'worker-row';
      row.id = `row-${ci}-${wi}`;
      row.dataset.name = w.name;
      row.dataset.phone = w.phone || '';
      row.dataset.ci = ci;
      row.dataset.wi = wi;
      const phoneLink = w.phone ? `<a class="call-btn" href="tel:${w.phone}">📞</a>` : `<div class="call-btn" style="opacity:0.3">📞</div>`;
      row.innerHTML = `
        <div class="worker-info">
          <div class="worker-name">${w.name}</div>
          <div class="worker-phone">${w.phone || '—'}</div>
          ${w.note ? `<div class="worker-note">${w.note}</div>` : ''}
        </div>
        <div class="btn-group">
          <button class="btn-check btn-yes" onclick="toggle(${ci},${wi},'present')" title="נוכח">✓</button>
          <button class="btn-check btn-no" onclick="toggle(${ci},${wi},'absent')" title="חסר">✗</button>
          <button class="btn-check btn-ok" onclick="toggleOk(${ci},${wi})" title="מצב תקין בסיום חירום">🛡</button>
          ${phoneLink}

      // add ok-badge inside worker-info

      list.appendChild(row);
    });
  });
  updateStats();
}

function toggleSection(ci) {
  const list = document.getElementById(`list-${ci}`);
  const chevron = document.getElementById(`chevron-${ci}`);
  list.classList.toggle('open');
  chevron.classList.toggle('open');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  filterWorkers();
}

function filterWorkers() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  contractors.forEach((c, ci) => {
    let anyVisible = false;
    c.workers.forEach((w, wi) => {
      const row = document.getElementById(`row-${ci}-${wi}`);
      if(!row) return;
      const k = workerKey(ci, wi);
      const s = state[k] || 'unknown';
      const matchFilter =
        currentFilter==='all' ||
        (currentFilter==='present' && s==='present') ||
        (currentFilter==='absent' && s==='absent') ||
        (currentFilter==='unknown' && !state[k]);
      const matchSearch = !q || w.name.includes(q) || (w.phone||'').includes(q);
      const show = matchFilter && matchSearch;
      row.style.display = show ? '' : 'none';
      if(show) anyVisible = true;
    });
    const section = document.getElementById(`section-${ci}`);
    if(section) section.style.display = anyVisible ? '' : 'none';
  });
}

function openReport() {
  const now = new Date();
  document.getElementById('report-time').textContent =
    `תאריך: ${now.toLocaleDateString('he-IL')}  |  שעה: ${now.toLocaleTimeString('he-IL')}`;

  let html = '';
  let totalP=0, totalA=0, totalU=0;

  contractors.forEach((c,ci) => {
    let cp=[], ca=[], cu=[];
    c.workers.forEach((w,wi) => {
      const s = state[workerKey(ci,wi)];
      if(s==='present') cp.push(w);
      else if(s==='absent') ca.push(w);
      else cu.push(w);
    });
    totalP+=cp.length; totalA+=ca.length; totalU+=cu.length;

    html += `<div class="report-section-title" style="color:${c.color}">${c.name} (${c.workers.length})</div>`;
    [...cp.map(w=>({w,s:'present'})), ...ca.map(w=>({w,s:'absent'})), ...cu.map(w=>({w,s:'unknown'}))].forEach(({w,s})=>{
      html += `<div class="report-line">
        <span>${w.name}</span>
        <span style="display:flex;gap:6px;align-items:center">
          <span class="badge ${s==='present'?'p':s==='absent'?'a':'u'}">${s==='present'?'נוכח':s==='absent'?'חסר':'?'}</span>
          ${stateOk[workerKey(ci,wi)] ? '<span class="badge" style="background:linear-gradient(135deg,#14532d,#166534);color:#4ade80;border:1px solid #22c55e">🛡 בטוח</span>' : ''}
        </span>
      </div>`;
    });
  });

  html = `<div class="report-line" style="font-weight:700;font-size:15px">
    <span>סה"כ: ${totalP+totalA+totalU}</span>
    <span><span style="color:#22c55e">✓${totalP}</span> &nbsp; <span style="color:#ef4444">✗${totalA}</span> &nbsp; <span style="color:#eab308">?${totalU}</span></span>
  </div>` + html;

  document.getElementById('report-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if(e.target.id==='modal') document.getElementById('modal').classList.remove('open');
}

function resetAll() {
  if(!confirm('לאפס את כל הסימונים?')) return;
  Object.keys(state).forEach(k => delete state[k]);
  contractors.forEach((c,ci) => c.workers.forEach((_,wi) => renderWorkerRow(ci,wi)));
  updateStats();
}

  const now = new Date();

}

async function saveRow(key, status, ok) {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/checkin`, {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ id: key, status: status || null, ok: ok || false, updated_at: new Date().toISOString() })
    });
    if (res.ok) { setConn(true); showMsg('✓ נשמר בענן'); }
    else { setConn(false); showMsg('⚠ שגיאה בשמירה','#7f1d1d','#fca5a5','#ef4444'); }
  } catch(e) { setConn(false); showMsg('⚠ אין חיבור','#7f1d1d','#fca5a5','#ef4444'); }
}

async function loadAllFromSupabase() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/checkin?select=id,status,ok`, { headers: HEADERS });
    if (!res.ok) { setConn(false); return; }
    const rows = await res.json();
    rows.forEach(row => {
      if (row.status) state[row.id] = row.status;
      else delete state[row.id];
      if (row.ok) stateOk[row.id] = true;
      else delete stateOk[row.id];
    });
    contractors.forEach((c,ci) => c.workers.forEach((_,wi) => renderWorkerRow(ci,wi)));
    updateStats();
    setConn(true);
    showMsg('✓ נטען מהענן');
  } catch(e) { setConn(false); }
}
