function sbSave(ci,wi) {
  var k=key(ci,wi);

  fetch(SB+"/rest/v1/checkin", {

    body:body

function sbLoad(silent) {
  fetch(SB+"/rest/v1/checkin?select=id,status,ok", {
    headers:{"apikey":SK,"Authorization":"Bearer "+SK}
  }).then(function(r){return r.json();})
  .then(function(rows) {
    Object.keys(ST).forEach(function(k){delete ST[k];});
    Object.keys(OK).forEach(function(k){delete OK[k];});
    rows.forEach(function(row){
      if(row.status) ST[row.id]=row.status;

    C.forEach(function(c,ci){c.workers.forEach(function(_,wi){refreshRow(ci,wi);});});
    updStats(); doFilter();
    setDot(true);
    if(!silent) toast("\u2713 \u05e0\u05d8\u05e2\u05df");
  }).catch(function(){setDot(false);});
}

function updStats() {
  var tot=0,pr=0,ab=0;
  C.forEach(function(c,ci){
    c.workers.forEach(function(_,wi){
      tot++;
      var s=ST[key(ci,wi)];
      if(s==="yes") pr++; else if(s==="no") ab++;
    });
  });
  document.getElementById("st").textContent=tot;
  document.getElementById("sp").textContent=pr;
  document.getElementById("sa").textContent=ab;
  document.getElementById("su").textContent=tot-pr-ab;
  document.getElementById("pf").style.width=(tot?Math.round(pr/tot*100):0)+"%";
  C.forEach(function(c,ci){
    var cp=0,ca=0;
    c.workers.forEach(function(_,wi){
      var s=ST[key(ci,wi)];
      if(s==="yes") cp++; else if(s==="no") ca++;
    });
    var el=document.getElementById("ss"+ci);
    if(el) el.innerHTML="<span style='color:#22c55e;font-weight:700;font-size:12px'>\u2713"+cp+"</span>&nbsp;<span style='color:#ef4444;font-weight:700;font-size:12px'>\u2717"+ca+"</span>";
  });
}

function refreshRow(ci,wi) {

  var k=key(ci,wi), s=ST[k];
  row.className="wrow"+(s==="yes"?" yes":s==="no"?" no":"");

  var bn=row.querySelector(".bn"); if(bn) bn.className="bc bn"+(s==="no"?" on":"");

}

    c.workers.forEach(function(w,wi){
      var s=ST[key(ci,wi)];
      if(s==="yes") cp.push({w:w,wi:wi});
      else if(s==="no") ca.push({w:w,wi:wi});
      else cu.push({w:w,wi:wi});
    });
    tp+=cp.length; ta+=ca.length; tu+=cu.length;
    html+="<div class='rs' style='color:"+c.color+"'>"+c.name+" ("+c.workers.length+")</div>";
    cp.concat(ca).concat(cu).forEach(function(x) {
      var si=cp.indexOf(x)>=0?"yes":ca.indexOf(x)>=0?"no":"uk";
      var b=si==="yes"?"<span class='bdg bdg-p'>\u05e0\u05d5\u05db\u05d7</span>":si==="no"?"<span class='bdg bdg-a'>\u05d7\u05e1\u05e8</span>":"<span class='bdg bdg-u'>?</span>";
      var ob=OK[key(ci,x.wi)]?"<span class='bdg bdg-ok'>\ud83d\udee1</span>":"";
      html+="<div class='rl'><span>"+x.w.name+"</span><span style='display:flex;gap:5px'>"+b+ob+"</span></div>";
    });
  });
  var sum="<div class='rl' style='font-weight:700;font-size:15px;border-top:2px solid var(--accent);margin-bottom:6px'>"+
    "<span>\u05e1\u05d4\"\u05db: "+(tp+ta+tu)+"</span>"+
    "<span><span style='color:#22c55e'>\u2713"+tp+"</span>&nbsp;<span style='color:#ef4444'>\u2717"+ta+"</span>&nbsp;<span style='color:#eab308'>?"+tu+"</span></span></div>";
  document.getElementById("rb").innerHTML=sum+html;
  openOv("ov-r");
}

function askPwd(action) {
  pendAct=action;
  document.getElementById("pi").value="";
  document.getElementById("pe").style.display="none";
  openOv("ov-p");
  setTimeout(function(){document.getElementById("pi").focus();},300);
}
function chkPwd() {
  if(document.getElementById("pi").value===PASS) {
    closeOv("ov-p");
    if(pendAct==="rst") doRst(); else openAdm();
  } else {
    document.getElementById("pe").style.display="block";
    document.getElementById("pi").value="";
  }
}

function doRst() {
  if(!confirm("\u05dc\u05d0\u05e4\u05e1 \u05e1\u05d9\u05de\u05d5\u05e0\u05d9\u05dd?")) return;
  Object.keys(ST).forEach(function(k){delete ST[k];});
  Object.keys(OK).forEach(function(k){delete OK[k];});
  C.forEach(function(c,ci){c.workers.forEach(function(_,wi){refreshRow(ci,wi);});});
  updStats(); doFilter(); toast("\u2713 \u05de\u05d0\u05e4\u05e1...");
  fetch(SB+"/rest/v1/checkin?select=id",{headers:{"apikey":SK,"Authorization":"Bearer "+SK}})
  .then(function(r){return r.json();})
  .then(function(rows){
    if(!rows||!rows.length) return;
    var ids=rows.map(function(r){return r.id;}).join(",");
    return fetch(SB+"/rest/v1/checkin?id=in.("+ids+")",{
      method:"DELETE",headers:{"apikey":SK,"Authorization":"Bearer "+SK}
    });
  }).then(function(){toast("\u2713 \u05d0\u05d5\u05e4\u05e1 \u05d1\u05e2\u05e0\u05df");})
  .catch(function(){});
}

function openAdm() {
  stopRef();
  document.getElementById("sc").innerHTML=C.map(function(c,i){return "<option value='"+i+"'>"+c.name+"</option>";}).join("");
  swTab("w",document.getElementById("tb-w"));
  openOv("ov-a");
}
function closeAdm() {
  closeOv("ov-a");
  document.getElementById("mc").innerHTML="";
  buildUI();
  C.forEach(function(c,ci){c.workers.forEach(function(_,wi){refreshRow(ci,wi);});});
  updStats(); doFilter(); startRef();
}
function swTab(t,btn) {
  ["w","a","c"].forEach(function(x){document.getElementById("pn-"+x).style.display=x===t?"":"none";});
  document.querySelectorAll(".tb").forEach(function(b){b.className="tb";});
  btn.className="tb on";
  if(t==="w") renderAdm();
  if(t==="c") renderCL();
}
function renderAdm() {
  var q=(document.getElementById("aq").value||"").toLowerCase();
  var html="";
  C.forEach(function(c,ci){
    var fl=c.workers.map(function(w,wi){return {w:w,wi:wi};}).filter(function(x){return !q||x.w.name.indexOf(q)>=0||x.w.phone.indexOf(q)>=0;});
    if(!fl.length) return;
    html+="<div style='font-size:11px;font-weight:700;color:"+c.color+";padding:8px 0 4px;border-bottom:1px solid var(--border)'>"+c.name+"</div>";
    fl.forEach(function(x){
      html+="<div style='display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)'>"+
        "<div><div style='font-size:13px;font-weight:600'>"+x.w.name+"</div>"+
        "<div style='font-size:11px;color:var(--muted)'>"+(x.w.phone||"\u2014")+(x.w.note?" | "+x.w.note:"")+"</div></div>"+
        "<button onclick='openE("+ci+","+x.wi+")' style='padding:5px 12px;background:#1e40af;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer'>\u270f\ufe0f \u05e2\u05e8\u05d9\u05db\u05d4</button>"+
        "</div>";
    });
  });
  document.getElementById("al").innerHTML=html||"<div style='color:var(--muted);text-align:center;padding:20px'>\u05dc\u05d0 \u05e0\u05de\u05e6\u05d0\u05d5</div>";
}
function openE(ci,wi) {
  var w=C[ci].workers[wi];
  document.getElementById("eci").value=ci; document.getElementById("ewi").value=wi;
  document.getElementById("en").value=w.name;
  document.getElementById("ep").value=w.phone||"";
  document.getElementById("et").value=w.note||"";
  openOv("ov-e");
}
function saveE() {
  var ci=+document.getElementById("eci").value, wi=+document.getElementById("ewi").value;
  C[ci].workers[wi].name=document.getElementById("en").value.trim();
  C[ci].workers[wi].phone=document.getElementById("ep").value.trim();
  C[ci].workers[wi].note=document.getElementById("et").value.trim();
  closeOv("ov-e"); renderAdm(); toast("\u2713 \u05e0\u05e9\u05de\u05e8");
}
function delW() {
  var ci=+document.getElementById("eci").value, wi=+document.getElementById("ewi").value;
  if(!confirm("\u05dc\u05de\u05d7\u05d5\u05e7?")) return;
  C[ci].workers.splice(wi,1);
  closeOv("ov-e"); renderAdm();
}
function addW() {
  var ci=+document.getElementById("sc").value;
  var name=document.getElementById("nn").value.trim();
  var phone=document.getElementById("np").value.trim();
  var note=document.getElementById("nt").value.trim();
  var msg=document.getElementById("am");
  if(!name){msg.style.display="block";msg.style.color="var(--red)";msg.textContent="\u26a0 \u05e0\u05d0 \u05dc\u05d4\u05d6\u05d9\u05df \u05e9\u05dd";return;}
  C[ci].workers.push({name:name,phone:phone,note:note});
  document.getElementById("nn").value=""; document.getElementById("np").value=""; document.getElementById("nt").value="";
  msg.style.display="block"; msg.style.color="#4ade80";
  msg.textContent="\u2713 "+name+" \u05e0\u05d5\u05e1\u05e3";
  setTimeout(function(){msg.style.display="none";},3000);
}
function renderCL() {
  var html="";
  C.forEach(function(c,ci){
    html+="<div style='display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)'>"+
      "<div style='display:flex;align-items:center;gap:8px'>"+
      "<div style='width:11px;height:11px;border-radius:50%;background:"+c.color+"'></div>"+
      "<div><div style='font-size:13px;font-weight:600'>"+c.name+"</div>"+
      "<div style='font-size:11px;color:var(--muted)'>"+c.workers.length+" \u05e2\u05d5\u05d1\u05d3\u05d9\u05dd</div></div></div>"+
      "<button onclick='delC("+ci+")' style='padding:5px 12px;background:#7f1d1d;color:#fca5a5;border:none;border-radius:8px;font-family:inherit;font-size:12px;cursor:pointer'>\u05de\u05d7\u05e7</button>"+
      "</div>";
  });
  document.getElementById("cl").innerHTML=html;
}
function addC() {
  var name=document.getElementById("nc").value.trim(); if(!name) return;
  var cols=["#1E40AF","#15803D","#7C3AED","#B45309","#DC2626","#0891B2","#475569"];
  C.push({name:name,color:cols[C.length%cols.length],workers:[]});
  document.getElementById("nc").value="";
  document.getElementById("sc").innerHTML=C.map(function(c,i){return "<option value='"+i+"'>"+c.name+"</option>";}).join("");
  renderCL();
}
function delC(ci) {
  if(!confirm("\u05dc\u05de\u05d7\u05d5\u05e7?")) return;
  C.splice(ci,1);
  document.getElementById("sc").innerHTML=C.map(function(c,i){return "<option value='"+i+"'>"+c.name+"</option>";}).join("");
  renderCL();
}

function updClock() {
  var n=new Date();
  document.getElementById("dtm").innerHTML="<strong>"+n.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})+"</strong><br>"+n.toLocaleDateString("he-IL");
}

buildUI();
updClock();
setInterval(updClock,10000);
sbLoad(false);
startRef();

</script>
</body>
</html>
